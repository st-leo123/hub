<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal Hub</title>
    <style>
        body {
            background-color: #0d1117;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        #terminal {
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            flex-grow: 1;
        }
        .output-line {
            margin-bottom: 6px;
            word-wrap: break-word;
            line-height: 1.4;
        }
        .command-line {
            display: flex;
            align-items: center;
            margin-top: 10px;
        }
        .prompt {
            color: #58a6ff;
            margin-right: 10px;
            font-weight: bold;
        }
        input[type="text"], input[type="password"] {
            background-color: transparent;
            border: none;
            color: #00ff00;
            font-family: inherit;
            font-size: inherit;
            flex-grow: 1;
            outline: none;
            caret-color: #00ff00;
        }
        .category-title {
            color: #ff7b72;
            font-weight: bold;
            margin-top: 10px;
        }
        .link-item {
            color: #d2a8ff;
            margin-left: 15px;
        }
    </style>
</head>
<body>
    <div id="terminal">
        <div id="output">
            <div class="output-line">System Boot...</div>
            <div class="output-line">Authentication required.</div>
            <br>
        </div>
        <div class="command-line">
            <span class="prompt" id="promptText">Password:</span>
            <input type="password" id="commandInput" autofocus autocomplete="off" spellcheck="false">
        </div>
    </div>

    <script>
        const input = document.getElementById('commandInput');
        const output = document.getElementById('output');
        const promptText = document.getElementById('promptText');

        // --- CONFIGURATION ---
        const SYSTEM_PASSWORD = "leo42"; // Change your password here

        // Add, remove, or change your links here
        const database = {
            canva: [
                { name: 'Main Pitch Deck', url: 'https://www.canva.com/' },
                { name: 'UI/UX Prototypes', url: 'https://www.canva.com/' }
            ],
            doc: [
                { name: 'Project Proposal', url: 'https://docs.google.com/' },
                { name: 'Meeting Minutes', url: 'https://docs.google.com/' }
            ],
            excel: [
                { name: 'Timeline & Gantt Chart', url: 'https://sheets.google.com/' },
                { name: 'Budget Planning', url: 'https://sheets.google.com/' }
            ],
            drive: [
                { name: 'Media Assets Folder', url: 'https://drive.google.com/' },
                { name: 'Final Submission Zip', url: 'https://drive.google.com/' }
            ]
        };

        // --- SYSTEM STATE ---
        let currentState = 'locked'; // 'locked', 'home', 'category'
        let currentCategory = null;

        input.addEventListener('keydown', function(event) {
            if (event.key === 'Enter') {
                const command = input.value.trim();
                
                if (currentState === 'locked') {
                    handleLogin(command);
                } else {
                    const cleanCommand = command.toLowerCase();
                    if (cleanCommand) {
                        printLine(`${promptText.innerText} ${command}`);
                        processCommand(cleanCommand);
                    } else {
                        printLine(`${promptText.innerText}`);
                    }
                }
                input.value = ''; 
            }
        });

        function printLine(text, cssClass = 'output-line') {
            const line = document.createElement('div');
            line.className = cssClass;
            line.textContent = text;
            output.appendChild(line);
            window.scrollTo(0, document.body.scrollHeight);
        }

        function handleLogin(attempt) {
            // Mask password typing with asterisks in the log
            printLine(`Password: ${'*'.repeat(attempt.length)}`);
            
            if (attempt === SYSTEM_PASSWORD) {
                currentState = 'home';
                input.type = 'text'; // Switch from password masking to normal text
                promptText.innerText = 'admin@hub:~$';
                printLine('Access Granted.', 'category-title');
                printLine('Welcome to the Presentation Hub.');
                printLine("Type 'ls' to view categories or 'help' for commands.");
                printLine('----------------------------------------');
            } else {
                printLine('Access Denied. Incorrect password.', 'category-title');
            }
        }

        function processCommand(cmd) {
            if (cmd === 'clear') {
                output.innerHTML = '';
                return;
            }

            if (currentState === 'home') {
                switch(cmd) {
                    case 'help':
                        printLine('Available commands:');
                        printLine('  ls       : List all file categories');
                        printLine('  [name]   : Type a category name (e.g., canva) to open it');
                        printLine('  clear    : Clear terminal screen');
                        printLine('  lock     : Lock the system');
                        break;
                    case 'ls':
                        printLine('Directory Listing:', 'category-title');
                        Object.keys(database).forEach(cat => {
                            printLine(`  📁 ${cat} (${database[cat].length} items)`);
                        });
                        printLine("Type a category name to explore.");
                        break;
                    case 'lock':
                        currentState = 'locked';
                        input.type = 'password';
                        promptText.innerText = 'Password:';
                        output.innerHTML = '';
                        printLine('System locked. Authentication required.');
                        break;
                    default:
                        if (database[cmd]) {
                            // Enter category mode
                            currentState = 'category';
                            currentCategory = cmd;
                            promptText.innerText = `admin@hub/${cmd}:~$`;
                            
                            printLine(`Contents of /${cmd}:`, 'category-title');
                            database[cmd].forEach((item, index) => {
                                printLine(`  [${index + 1}] ${item.name}`, 'link-item');
                            });
                            printLine("Type the number to open the link, or 'back' to return.");
                        } else {
                            printLine(`Command or directory not found: ${cmd}`);
                        }
                }
            } else if (currentState === 'category') {
                if (cmd === 'back' || cmd === 'cd ..') {
                    currentState = 'home';
                    currentCategory = null;
                    promptText.innerText = 'admin@hub:~$';
                } else {
                    // Check if it's a valid number
                    const index = parseInt(cmd) - 1;
                    const categoryItems = database[currentCategory];
                    
                    if (!isNaN(index) && index >= 0 && index < categoryItems.length) {
                        const targetItem = categoryItems[index];
                        printLine(`Opening ${targetItem.name}...`);
                        setTimeout(() => {
                            window.open(targetItem.url, '_blank'); // Opens in new tab
                        }, 500);
                    } else {
                        printLine(`Invalid index. Enter a number between 1 and ${categoryItems.length}, or 'back'.`);
                    }
                }
            }
        }

        // Keep focus locked on input
        document.addEventListener('click', () => {
            input.focus();
        });
    </script>
</body>
</html>
